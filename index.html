<!DOCTYPE html> <!-- declaration that defines the document type and version of HTML being used, in this case, HTML5. -->
<html lang="en"> <!-- opening tag for the HTML document, with a language attribute set to "en" for English. -->
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- sets the viewport to control the layout on mobile browsers, making it responsive. -->
    <title>html learnings</title>  <!-- title of the document that appears in the browser tab and is used by search engines. -->
